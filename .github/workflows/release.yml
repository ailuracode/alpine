name: Release

on:
  push:
    branches: [main, master]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        run: |
          set -euo pipefail
          git init
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Run tests
        run: pnpm test

      - name: Configure npm auth
        if: ${{ secrets.NPM_TOKEN != '' }}
        uses: ./.github/actions/npm-auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Version packages or publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          shopt -s nullglob
          pending=(.changeset/*.md)
          has_changesets=false

          for file in "${pending[@]}"; do
            if [ "$(basename "$file")" != "README.md" ]; then
              has_changesets=true
              break
            fi
          done

          if [ "$has_changesets" = true ]; then
            pnpm run version
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "Version Packages"
            git push origin "HEAD:changeset-release/${GITHUB_REF_NAME}" --force
            echo "Version branch pushed to changeset-release/${GITHUB_REF_NAME}."
            echo "Open a pull request manually if Actions cannot create one."
            exit 0
          fi

          pnpm run publish:ci
