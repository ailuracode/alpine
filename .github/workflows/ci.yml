name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/checkout

      - uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/checkout

      - uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Run tests
        run: pnpm test

      - name: Run tests with coverage
        run: pnpm run test:coverage

  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/checkout

      - uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate package tarballs
        run: pnpm run pack:check

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/checkout

      - uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit critical vulnerabilities
        run: pnpm audit --audit-level critical

  changeset:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/checkout
        with:
          fetch-depth: "0"

      - uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Require changeset for package changes
        run: pnpm run changeset:check -- --since=origin/${{ github.base_ref }}
