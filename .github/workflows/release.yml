name: Release

on:
  push:
    branches: [main, master]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        run: |
          set -euo pipefail
          git init
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Run tests
        run: pnpm test

      - name: Version packages or publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          if [ -n "${NPM_TOKEN:-}" ]; then
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> "$HOME/.npmrc"
          fi

          shopt -s nullglob
          pending=(.changeset/*.md)
          has_changesets=false

          for file in "${pending[@]}"; do
            if [ "$(basename "$file")" != "README.md" ]; then
              has_changesets=true
              break
            fi
          done

          if [ "$has_changesets" = true ]; then
            pnpm run version
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "Version Packages"
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin "HEAD:changeset-release/${GITHUB_REF_NAME}" --force
            echo "Version branch pushed to changeset-release/${GITHUB_REF_NAME}."

            export GH_TOKEN="${GITHUB_TOKEN}"
            if gh pr view "changeset-release/${GITHUB_REF_NAME}" --json number >/dev/null 2>&1; then
              echo "Version Packages pull request already exists."
            else
              gh pr create \
                --base "${GITHUB_REF_NAME}" \
                --head "changeset-release/${GITHUB_REF_NAME}" \
                --title "Version Packages" \
                --body "This PR was opened automatically by the Release workflow.

Merge it to publish changed packages to npm."
              echo "Version Packages pull request created."
            fi
            exit 0
          fi

          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN is not configured. Add an npm publish token in repository secrets before releasing."
            exit 1
          fi

          pnpm run publish:ci
