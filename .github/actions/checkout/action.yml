name: Checkout
description: Check out the repository without third-party actions
inputs:
  fetch-depth:
    description: Number of commits to fetch (0 = full history)
    required: false
    default: "1"
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail
        cd "$GITHUB_WORKSPACE"
        git init
        git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"

        if [ "${{ inputs.fetch-depth }}" = "0" ]; then
          git fetch --no-tags origin "${GITHUB_SHA}"
        else
          git fetch --depth="${{ inputs.fetch-depth }}" --no-tags origin "${GITHUB_SHA}"
        fi

        git checkout FETCH_HEAD

        if [ "${GITHUB_EVENT_NAME}" = "pull_request" ] && [ "${{ inputs.fetch-depth }}" = "0" ]; then
          git fetch --no-tags origin "${GITHUB_BASE_REF}"
        fi
